<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUNDI FASTA - SMART VEHICLE SOLUTIONS |  FUNDI FASTA PLATFORM | ONLINE  PLATFORM  TO  SOLVE MOTOR VEHICLE PROBLEMS ANY WHERE YOU ARE</title>
    <meta name="description" content="FUNDI FASTA - Your trusted platform for professional vehicle repair and maintenance services. Find expert mechanics, compare quotes, and fix your car faster." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f0f4f8;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #e8edf3;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #0891b2;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #0e7490;
      }
      
      /* FUNDI FASTA Loading animation */
      .loader {
        width: 56px;
        height: 56px;
        border: 5px solid #e2e8f0;
        border-top: 5px solid #0891b2;
        border-right: 5px solid #0e7490;
        border-radius: 50%;
        animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        margin: 0 auto 20px;
        box-shadow: 0 4px 20px rgba(8, 145, 178, 0.15);
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Brand pulse animation */
      .brand-pulse {
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #1a2332;
      }
      
      .dark ::-webkit-scrollbar-thumb {
        background: #0891b2;
      }
      
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #0e7490;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- React will render here -->
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);">
        <div style="text-align: center; padding: 20px;">
          <div class="loader"></div>
          <div style="margin-top: 12px;">
            <p style="color: #0891b2; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px;">FUNDI FASTA</p>
            <p style="color: #64748b; font-size: 13px; font-weight: 400; letter-spacing: 0.3px;">Smart Vehicle Solutions</p>
            <p style="color: #94a3b8; font-size: 12px; margin-top: 16px; animation: pulse 2s ease-in-out infinite;">Loading your experience...</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Vite will inject the bundled JavaScript here -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
